<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SentinelAPI - Dashboard de Monitoramento</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --success: #10b981;
            --success-light: #34d399;
            --warning: #f59e0b;
            --warning-light: #fbbf24;
            --danger: #ef4444;
            --danger-light: #f87171;
            --dark: #1e293b;
            --darker: #0f172a;
            --light: #f8fafc;
            --gray: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            padding: 20px;
            color: #333;
            position: relative;
            overflow-x: hidden;
        }

        /* Background animado com gradiente ultra moderno */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 77, 109, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(59, 130, 246, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(139, 92, 246, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 100% 0%, rgba(16, 185, 129, 0.2) 0%, transparent 50%);
            z-index: -2;
            animation: rotate 30s linear infinite;
        }

        @keyframes rotate {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        /* Mesh gradient overlay */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(125deg, rgba(59, 130, 246, 0.1) 0%, transparent 40%),
                linear-gradient(245deg, rgba(139, 92, 246, 0.1) 0%, transparent 40%),
                linear-gradient(335deg, rgba(236, 72, 153, 0.1) 0%, transparent 40%);
            z-index: -1;
            animation: meshMove 20s ease-in-out infinite alternate;
        }

        @keyframes meshMove {
            0% {
                opacity: 0.5;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0.8;
                transform: translateY(-30px) scale(1.05);
            }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: linear-gradient(135deg, rgba(30, 30, 46, 0.7) 0%, rgba(20, 20, 36, 0.6) 100%);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 2px solid rgba(139, 92, 246, 0.3);
            padding: 40px 45px;
            border-radius: 30px;
            box-shadow: 
                0 20px 60px rgba(139, 92, 246, 0.4),
                0 0 100px rgba(59, 130, 246, 0.2),
                0 8px 32px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            margin-bottom: 35px;
            animation: slideDown 1s cubic-bezier(0.16, 1, 0.3, 1), headerGlow 3s ease-in-out infinite alternate;
            position: relative;
            overflow: hidden;
        }

        /* Efeito de brilho animado no header */
        header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, 
                transparent 30%, 
                rgba(139, 92, 246, 0.1) 50%, 
                transparent 70%);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% {
                transform: translateX(-100%) translateY(-100%) rotate(45deg);
            }
            100% {
                transform: translateX(100%) translateY(100%) rotate(45deg);
            }
        }

        @keyframes headerGlow {
            0% {
                box-shadow: 
                    0 20px 60px rgba(139, 92, 246, 0.3),
                    0 0 80px rgba(59, 130, 246, 0.2),
                    0 8px 32px rgba(0, 0, 0, 0.6),
                    inset 0 1px 0 rgba(255, 255, 255, 0.1);
            }
            100% {
                box-shadow: 
                    0 20px 70px rgba(139, 92, 246, 0.5),
                    0 0 120px rgba(59, 130, 246, 0.3),
                    0 8px 40px rgba(0, 0, 0, 0.6),
                    inset 0 1px 0 rgba(255, 255, 255, 0.15);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-80px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff 0%, #a78bfa 50%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            text-shadow: 0 0 80px rgba(139, 92, 246, 0.6);
            letter-spacing: -1px;
            position: relative;
            animation: titleGlow 3s ease-in-out infinite alternate;
        }

        @keyframes titleGlow {
            0% {
                filter: drop-shadow(0 0 20px rgba(139, 92, 246, 0.6));
            }
            100% {
                filter: drop-shadow(0 0 40px rgba(139, 92, 246, 0.9));
            }
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.95);
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            position: relative;
        }

        .last-update {
            margin-left: auto;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.95);
            display: flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.3) 0%, rgba(59, 130, 246, 0.3) 100%);
            padding: 12px 24px;
            border-radius: 50px;
            border: 1px solid rgba(139, 92, 246, 0.4);
            box-shadow: 0 0 30px rgba(139, 92, 246, 0.3);
            position: relative;
        }

        .pulse {
            width: 12px;
            height: 12px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 
                0 0 20px #10b981,
                0 0 40px #10b981,
                0 0 60px #10b981;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
                box-shadow: 
                    0 0 20px #10b981,
                    0 0 40px #10b981,
                    0 0 60px #10b981;
            }
            50% {
                opacity: 0.8;
                transform: scale(1.4);
                box-shadow: 
                    0 0 30px #10b981,
                    0 0 60px #10b981,
                    0 0 90px #10b981;
            }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(30, 30, 46, 0.8) 0%, rgba(20, 20, 36, 0.7) 100%);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 2px solid rgba(139, 92, 246, 0.2);
            padding: 35px;
            border-radius: 25px;
            box-shadow: 
                0 15px 50px rgba(0, 0, 0, 0.5),
                0 0 60px rgba(139, 92, 246, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1);
            animation-fill-mode: both;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        /* Efeito de brilho no fundo do card */
        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, 
                transparent 30%, 
                rgba(139, 92, 246, 0.15) 50%, 
                transparent 70%);
            opacity: 0;
            transition: all 0.6s ease;
            transform: rotate(45deg);
        }

        .stat-card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 25px;
            padding: 2px;
            background: linear-gradient(135deg, 
                rgba(139, 92, 246, 0.5), 
                rgba(59, 130, 246, 0.5), 
                rgba(236, 72, 153, 0.5));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .stat-card:hover::before {
            opacity: 1;
            animation: shine 1.5s infinite;
        }

        .stat-card:hover::after {
            opacity: 1;
        }

        .stat-card:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.6),
                0 0 100px rgba(139, 92, 246, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
            border-color: rgba(139, 92, 246, 0.5);
        }

        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }
        .stat-card:nth-child(3) { animation-delay: 0.3s; }
        .stat-card:nth-child(4) { animation-delay: 0.4s; }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(60px) scale(0.8);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .stat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
        }

        .stat-icon {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(139, 92, 246, 0.4);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .stat-icon::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 22px;
            background: inherit;
            filter: blur(15px);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: -1;
        }

        .stat-card:hover .stat-icon {
            transform: scale(1.15) rotate(-5deg);
            box-shadow: 
                0 15px 40px rgba(0, 0, 0, 0.6),
                0 0 60px rgba(139, 92, 246, 0.6);
        }

        .stat-card:hover .stat-icon::after {
            opacity: 0.8;
        }

        .stat-value {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 4px 15px rgba(139, 92, 246, 0.5));
            letter-spacing: -2px;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 700;
        }

        .endpoints-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .endpoint-card {
            background: linear-gradient(135deg, rgba(30, 30, 46, 0.8) 0%, rgba(20, 20, 36, 0.7) 100%);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 2px solid rgba(139, 92, 246, 0.2);
            padding: 32px;
            border-radius: 25px;
            box-shadow: 
                0 15px 50px rgba(0, 0, 0, 0.5),
                0 0 60px rgba(139, 92, 246, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border-left: 5px solid var(--primary);
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        /* Brilho na borda esquerda */
        .endpoint-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 5px;
            height: 100%;
            background: linear-gradient(180deg, var(--primary), transparent);
            filter: blur(10px);
            opacity: 0;
            transition: all 0.4s ease;
        }

        /* Efeito de luz de fundo */
        .endpoint-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .endpoint-card:hover {
            transform: translateY(-12px) scale(1.03);
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.6),
                0 0 100px rgba(139, 92, 246, 0.3),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
            border-color: rgba(139, 92, 246, 0.4);
        }

        .endpoint-card:hover::before {
            opacity: 1;
        }

        .endpoint-card:hover::after {
            opacity: 1;
            animation: rotate 3s linear infinite;
        }

        .endpoint-card.healthy {
            border-left-color: var(--success);
            box-shadow: 
                0 15px 50px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(16, 185, 129, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .endpoint-card.healthy::before {
            background: linear-gradient(180deg, var(--success), transparent);
        }

        .endpoint-card.healthy:hover {
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.6),
                0 0 80px rgba(16, 185, 129, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }

        .endpoint-card.degraded {
            border-left-color: var(--warning);
            box-shadow: 
                0 15px 50px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(245, 158, 11, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .endpoint-card.degraded::before {
            background: linear-gradient(180deg, var(--warning), transparent);
        }

        .endpoint-card.degraded:hover {
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.6),
                0 0 80px rgba(245, 158, 11, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }

        .endpoint-card.down {
            border-left-color: var(--danger);
            box-shadow: 
                0 15px 50px rgba(0, 0, 0, 0.5),
                0 0 40px rgba(239, 68, 68, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .endpoint-card.down::before {
            background: linear-gradient(180deg, var(--danger), transparent);
        }

        .endpoint-card.down:hover {
            box-shadow: 
                0 25px 80px rgba(0, 0, 0, 0.6),
                0 0 80px rgba(239, 68, 68, 0.4),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }

        .endpoint-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .endpoint-name {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 2px 10px rgba(139, 92, 246, 0.3));
            letter-spacing: -0.5px;
        }

        .status-badge {
            padding: 10px 22px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            box-shadow: 
                0 5px 20px rgba(0, 0, 0, 0.4),
                0 0 30px currentColor;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .status-badge::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 32px;
            background: inherit;
            filter: blur(10px);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: -1;
        }

        .endpoint-card:hover .status-badge {
            transform: scale(1.1);
            box-shadow: 
                0 8px 25px rgba(0, 0, 0, 0.5),
                0 0 50px currentColor;
        }

        .endpoint-card:hover .status-badge::after {
            opacity: 0.6;
        }

        .status-badge.healthy {
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            color: white;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.8);
        }

        .status-badge.degraded {
            background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
            color: white;
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.8);
        }

        .status-badge.down {
            background: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
            color: white;
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.8);
        }

        .endpoint-url {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.95rem;
            margin-bottom: 20px;
            word-break: break-all;
            font-weight: 500;
        }

        .endpoint-metrics {
            display: flex;
            gap: 30px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(139, 92, 246, 0.2);
        }

        .metric {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
        }

        .metric i {
            color: rgba(139, 92, 246, 0.9);
            font-size: 1.2rem;
            filter: drop-shadow(0 0 5px rgba(139, 92, 246, 0.5));
        }

        .metric-value {
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .chart-container {
            background: linear-gradient(135deg, rgba(30, 30, 46, 0.8) 0%, rgba(20, 20, 36, 0.7) 100%);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 2px solid rgba(139, 92, 246, 0.3);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 80px rgba(139, 92, 246, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: fadeInUp 1s cubic-bezier(0.16, 1, 0.3, 1) 0.7s;
            animation-fill-mode: both;
            position: relative;
            overflow: hidden;
        }

        .chart-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, 
                transparent 0%,
                rgba(139, 92, 246, 0.8) 50%,
                transparent 100%);
            animation: slideLight 3s ease-in-out infinite;
        }

        @keyframes slideLight {
            0%, 100% {
                transform: translateX(-100%);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translateX(100%);
            }
        }

        .chart-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 30px;
            background: linear-gradient(135deg, #fff 0%, #a78bfa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 2px 10px rgba(139, 92, 246, 0.4));
            letter-spacing: -0.5px;
        }

        canvas {
            max-height: 350px;
        }

        .loading {
            text-align: center;
            padding: 100px;
            color: white;
            font-size: 1.4rem;
            font-weight: 600;
        }

        .loading i {
            font-size: 4rem;
            margin-bottom: 30px;
            animation: spin 1s linear infinite;
            filter: drop-shadow(0 0 30px rgba(139, 92, 246, 0.8));
            color: rgba(139, 92, 246, 1);
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .error-message {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2) 0%, rgba(220, 38, 38, 0.15) 100%);
            border: 2px solid rgba(239, 68, 68, 0.4);
            color: #fecaca;
            padding: 18px 22px;
            border-radius: 15px;
            margin-top: 15px;
            font-size: 0.95rem;
            backdrop-filter: blur(10px);
            font-weight: 600;
            box-shadow: 0 0 30px rgba(239, 68, 68, 0.3);
        }

        /* Scrollbar personalizada */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Responsividade */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            
            .stat-value {
                font-size: 2.2rem;
            }
            
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .endpoints-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px;">
                <div>
                    <h1><i class="fas fa-shield-alt"></i> SentinelAPI</h1>
                    <div class="subtitle">
                        <i class="fas fa-heart-pulse"></i>
                        Monitoramento de APIs em Tempo Real
                    </div>
                </div>
                <div class="last-update">
                    <div class="pulse"></div>
                    <span>Atualizado: <strong id="lastUpdate">--</strong></span>
                </div>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                        <i class="fas fa-server"></i>
                    </div>
                </div>
                <div class="stat-value" id="totalEndpoints">0</div>
                <div class="stat-label">Total de Endpoints</div>
            </div>

            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon" style="background: linear-gradient(135deg, #10b981 0%, #34d399 100%);">
                        <i class="fas fa-check-circle"></i>
                    </div>
                </div>
                <div class="stat-value" id="healthyCount">0</div>
                <div class="stat-label">Saudáveis</div>
            </div>

            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon" style="background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);">
                        <i class="fas fa-exclamation-triangle"></i>
                    </div>
                </div>
                <div class="stat-value" id="degradedCount">0</div>
                <div class="stat-label">Degradados</div>
            </div>

            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon" style="background: linear-gradient(135deg, #ef4444 0%, #f87171 100%);">
                        <i class="fas fa-times-circle"></i>
                    </div>
                </div>
                <div class="stat-value" id="downCount">0</div>
                <div class="stat-label">Indisponíveis</div>
            </div>
        </div>

        <div class="endpoints-grid" id="endpointsContainer">
            <div class="loading">
                <i class="fas fa-spinner"></i>
                <div>Carregando dados de monitoramento...</div>
            </div>
        </div>

        <div class="chart-container">
            <h3 class="chart-title"><i class="fas fa-chart-line"></i> Tempo de Resposta</h3>
            <canvas id="responseTimeChart"></canvas>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script>
        let chart = null;

        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                updateDashboard(data);
            } catch (error) {
                console.error('Erro ao buscar status:', error);
            }
        }

        function updateDashboard(data) {
            // Atualizar estatísticas
            document.getElementById('totalEndpoints').textContent = data.stats.total_endpoints;
            document.getElementById('healthyCount').textContent = data.stats.healthy;
            document.getElementById('degradedCount').textContent = data.stats.degraded;
            document.getElementById('downCount').textContent = data.stats.down;

            // Atualizar último update
            if (data.last_check) {
                const date = new Date(data.last_check);
                document.getElementById('lastUpdate').textContent = date.toLocaleTimeString('pt-BR');
            }

            // Atualizar cards de endpoints
            const container = document.getElementById('endpointsContainer');
            container.innerHTML = '';

            data.results.forEach((endpoint, index) => {
                const card = document.createElement('div');
                card.className = `endpoint-card ${endpoint.status}`;
                card.style.animationDelay = `${index * 0.1}s`;

                const statusIcon = {
                    'healthy': 'fa-check-circle',
                    'degraded': 'fa-exclamation-triangle',
                    'down': 'fa-times-circle'
                }[endpoint.status] || 'fa-question-circle';

                card.innerHTML = `
                    <div class="endpoint-header">
                        <div class="endpoint-name">
                            <i class="fas ${statusIcon}"></i> ${endpoint.name}
                        </div>
                        <span class="status-badge ${endpoint.status}">
                            ${endpoint.status}
                        </span>
                    </div>
                    <div class="endpoint-url">
                        <i class="fas fa-link"></i> ${endpoint.url}
                    </div>
                    <div class="endpoint-metrics">
                        <div class="metric">
                            <i class="fas fa-clock"></i>
                            <span class="metric-value">${endpoint.response_time}s</span>
                        </div>
                        <div class="metric">
                            <i class="fas fa-code"></i>
                            <span class="metric-value">${endpoint.status_code || 'N/A'}</span>
                        </div>
                    </div>
                    ${endpoint.error_message ? `
                        <div class="error-message">
                            <i class="fas fa-exclamation-circle"></i> ${endpoint.error_message}
                        </div>
                    ` : ''}
                `;

                container.appendChild(card);
            });

            // Atualizar gráfico
            updateChart(data);
        }

        function updateChart(data) {
            const ctx = document.getElementById('responseTimeChart').getContext('2d');

            // Preparar dados do histórico
            const history = data.history.slice(-10); // Últimos 10 checks
            const labels = history.map(h => {
                const date = new Date(h.timestamp);
                return date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            });

            // Criar datasets para cada endpoint
            const endpointNames = [...new Set(data.results.map(r => r.name))];
            const datasets = endpointNames.map((name, index) => {
                const colors = [
                    { border: 'rgba(102, 126, 234, 1)', bg: 'rgba(102, 126, 234, 0.2)' },
                    { border: 'rgba(16, 185, 129, 1)', bg: 'rgba(16, 185, 129, 0.2)' },
                    { border: 'rgba(245, 158, 11, 1)', bg: 'rgba(245, 158, 11, 0.2)' },
                    { border: 'rgba(239, 68, 68, 1)', bg: 'rgba(239, 68, 68, 0.2)' },
                    { border: 'rgba(139, 92, 246, 1)', bg: 'rgba(139, 92, 246, 0.2)' },
                    { border: 'rgba(236, 72, 153, 1)', bg: 'rgba(236, 72, 153, 0.2)' }
                ];

                const color = colors[index % colors.length];

                return {
                    label: name,
                    data: history.map(h => {
                        const result = h.results.find(r => r.name === name);
                        return result ? result.response_time : null;
                    }),
                    borderColor: color.border,
                    backgroundColor: color.bg,
                    borderWidth: 3,
                    tension: 0.4,
                    fill: true,
                    pointRadius: 5,
                    pointHoverRadius: 7,
                    pointBackgroundColor: color.border,
                    pointBorderColor: '#fff',
                    pointBorderWidth: 2,
                    pointHoverBackgroundColor: '#fff',
                    pointHoverBorderColor: color.border,
                    pointHoverBorderWidth: 3
                };
            });

            if (chart) {
                chart.destroy();
            }

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            position: 'top',
                            labels: {
                                usePointStyle: true,
                                padding: 18,
                                font: {
                                    size: 13,
                                    family: 'Inter',
                                    weight: '600'
                                },
                                color: 'rgba(255, 255, 255, 0.9)',
                                boxWidth: 8,
                                boxHeight: 8
                            }
                        },
                        tooltip: {
                            mode: 'index',
                            intersect: false,
                            backgroundColor: 'rgba(0, 0, 0, 0.85)',
                            padding: 14,
                            cornerRadius: 10,
                            titleFont: {
                                size: 15,
                                family: 'Inter',
                                weight: '700'
                            },
                            bodyFont: {
                                size: 13,
                                family: 'Inter',
                                weight: '500'
                            },
                            borderColor: 'rgba(255, 255, 255, 0.2)',
                            borderWidth: 1
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'Tempo de Resposta (s)',
                                font: {
                                    size: 13,
                                    family: 'Inter',
                                    weight: '600'
                                },
                                color: 'rgba(255, 255, 255, 0.9)'
                            },
                            grid: {
                                color: 'rgba(255, 255, 255, 0.1)',
                                lineWidth: 1
                            },
                            ticks: {
                                color: 'rgba(255, 255, 255, 0.8)',
                                font: {
                                    size: 12,
                                    family: 'Inter',
                                    weight: '500'
                                }
                            }
                        },
                        x: {
                            grid: {
                                color: 'rgba(255, 255, 255, 0.05)',
                                lineWidth: 1
                            },
                            ticks: {
                                color: 'rgba(255, 255, 255, 0.8)',
                                font: {
                                    size: 11,
                                    family: 'Inter',
                                    weight: '500'
                                }
                            }
                        }
                    },
                    interaction: {
                        mode: 'nearest',
                        axis: 'x',
                        intersect: false
                    }
                }
            });
        }

        // Atualizar a cada 5 segundos
        fetchStatus();
        setInterval(fetchStatus, 5000);
    </script>
</body>
</html>
